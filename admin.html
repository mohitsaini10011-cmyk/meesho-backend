<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Dyana Core Admin Panel</title>
  <style>
    body{
      margin:0;
      font-family:Arial,sans-serif;
      background:linear-gradient(135deg,#090014,#23064b);
      color:#fff;
      padding:24px;
    }
    .box{
      max-width:1150px;
      margin:auto;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.18);
      border-radius:24px;
      padding:28px;
    }
    h1{margin:0 0 8px;font-size:34px}
    p{color:#d8c7ff}
    input,select{
      width:100%;
      padding:16px;
      margin:10px 0;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.2);
      background:#140c25;
      color:#fff;
      font-size:16px;
      box-sizing:border-box;
    }
    button{
      padding:14px 22px;
      border:0;
      border-radius:16px;
      background:linear-gradient(135deg,#8b5cf6,#ec4899);
      color:white;
      font-weight:800;
      cursor:pointer;
      margin:6px;
    }
    .login{
      max-width:560px;
      margin:30px auto;
    }
    .hidden{display:none}
    .status{
      padding:14px;
      border-radius:14px;
      margin:12px 0;
      background:#32123a;
      color:#ffd1e8;
    }
    table{
      width:100%;
      border-collapse:collapse;
      margin-top:20px;
      background:rgba(0,0,0,.18);
      border-radius:16px;
      overflow:hidden;
    }
    th,td{
      padding:12px;
      border-bottom:1px solid rgba(255,255,255,.12);
      text-align:left;
      font-size:13px;
    }
    th{background:rgba(255,255,255,.12)}
    .pill{
      padding:5px 10px;
      border-radius:999px;
      background:#22c55e;
      color:#04140a;
      font-weight:800;
    }
    .bad{background:#ef4444;color:#fff}
  </style>
</head>
<body>

  <div class="box">
    <h1>💜 Dyana Core Admin Panel</h1>
    <p>Manage users, subscriptions, IP/device lock, plans and login logs</p>

    <div id="loginBox" class="login">
      <h2>Admin Login</h2>
      <div id="loginStatus" class="status hidden"></div>
      <input id="adminEmail" value="admin@dyanacore.com" placeholder="Admin email" />
      <input id="adminPassword" value="admin123" type="password" placeholder="Admin password" />
      <button onclick="adminLogin()">Login</button>
      <p style="color:#ffd166">Default: admin@dyanacore.com / admin123</p>
    </div>

    <div id="dashboard" class="hidden">
      <button onclick="loadUsers()">Refresh Users</button>
      <button onclick="logout()">Logout</button>

      <div id="dashStatus" class="status hidden"></div>

      <h2>Users</h2>
      <table>
        <thead>
          <tr>
            <th>Email</th>
            <th>Name</th>
            <th>Plan</th>
            <th>Expiry</th>
            <th>Status</th>
            <th>IP</th>
            <th>Device</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </div>

<script>
const SERVER_URL = "https://meesho-backend-ga8x.onrender.com";
let ADMIN_TOKEN = localStorage.getItem("dc_admin_token") || "";

if (ADMIN_TOKEN) {
  document.getElementById("loginBox").classList.add("hidden");
  document.getElementById("dashboard").classList.remove("hidden");
  loadUsers();
}

function show(id, msg){
  const el = document.getElementById(id);
  el.textContent = msg;
  el.classList.remove("hidden");
}

async function adminLogin(){
  try{
    show("loginStatus","Logging in...");

    const email = document.getElementById("adminEmail").value.trim();
    const password = document.getElementById("adminPassword").value.trim();

    const res = await fetch(`${SERVER_URL}/admin/login`,{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ email, password })
    });

    const data = await res.json();

    if(!data.success){
      show("loginStatus", data.error || "Login failed");
      return;
    }

    ADMIN_TOKEN = data.token;
    localStorage.setItem("dc_admin_token", ADMIN_TOKEN);

    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    loadUsers();
  }catch(e){
    show("loginStatus","Server connection failed: " + e.message);
  }
}

async function loadUsers(){
  try{
    const res = await fetch(`${SERVER_URL}/admin/users`,{
      headers:{ Authorization:`Bearer ${ADMIN_TOKEN}` }
    });

    const data = await res.json();

    if(!data.success){
      show("dashStatus", data.error || "Failed to load users");
      return;
    }

    const body = document.getElementById("usersBody");
    body.innerHTML = "";

    data.users.forEach(u=>{
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${u.email}</td>
        <td>${u.name || "-"}</td>
        <td>${u.plan || "-"}</td>
        <td>${u.expiry ? new Date(u.expiry).toLocaleString() : "-"}</td>
        <td><span class="pill ${u.blocked || !u.active ? "bad":""}">${u.blocked ? "Blocked" : (u.active ? "Active" : "Expired")}</span></td>
        <td>${u.lockedIp || "-"}</td>
        <td>${u.lockedDevice || "-"}</td>
        <td>
          <select id="plan-${u.email}">
            <option value="monthly">Monthly</option>
            <option value="quarterly">3 Months</option>
            <option value="half_yearly">6 Months</option>
            <option value="yearly">Yearly</option>
            <option value="lifetime">Lifetime</option>
          </select>
          <button onclick="updatePlan('${u.email}')">Update Plan</button>
          <button onclick="resetDevice('${u.email}')">Reset IP/Device</button>
          <button onclick="blockUser('${u.email}', ${!u.blocked})">${u.blocked ? "Unblock":"Block"}</button>
          <button onclick="deleteUser('${u.email}')">Delete</button>
        </td>
      `;
      body.appendChild(tr);
    });
  }catch(e){
    show("dashStatus","Load error: " + e.message);
  }
}

async function apiPost(path, body){
  const res = await fetch(`${SERVER_URL}${path}`,{
    method:"POST",
    headers:{
      "Content-Type":"application/json",
      Authorization:`Bearer ${ADMIN_TOKEN}`
    },
    body:JSON.stringify(body)
  });
  return res.json();
}

async function updatePlan(email){
  const planId = document.getElementById(`plan-${email}`).value;
  const data = await apiPost("/admin/users/update-plan",{ email, planId });
  show("dashStatus", data.success ? "Plan updated" : data.error);
  loadUsers();
}

async function resetDevice(email){
  const data = await apiPost("/admin/users/reset-device",{ email });
  show("dashStatus", data.success ? "Device/IP reset" : data.error);
  loadUsers();
}

async function blockUser(email, blocked){
  const data = await apiPost("/admin/users/block",{ email, blocked });
  show("dashStatus", data.success ? "User updated" : data.error);
  loadUsers();
}

async function deleteUser(email){
  if(!confirm("Delete user?")) return;
  const data = await apiPost("/admin/users/delete",{ email });
  show("dashStatus", data.success ? "User deleted" : data.error);
  loadUsers();
}

function logout(){
  localStorage.removeItem("dc_admin_token");
  location.reload();
}
</script>
</body>
</html>
